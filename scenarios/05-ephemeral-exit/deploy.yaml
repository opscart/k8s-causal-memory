apiVersion: v1
kind: Namespace
metadata:
  name: oma-ephemeral
  labels:
    purpose: k8s-causal-memory-poc
---
# Target pod — a stable, long-running service to debug.
# The trigger script attaches an ephemeral container to this pod,
# lets it run for ~10 seconds, then it exits with code 42 (distinctive).
# After exit: kubectl shows nothing. OMA has the full record.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ephemeral-target-config
  namespace: oma-ephemeral
data:
  app.env: "poc"
  scenario: "05-ephemeral-exit"
---
apiVersion: v1
kind: Pod
metadata:
  name: ephemeral-target
  namespace: oma-ephemeral
  labels:
    app: ephemeral-target
    scenario: "05-ephemeral-exit"
spec:
  restartPolicy: Always
  containers:
  - name: app
    image: busybox:1.36
    command:
    - /bin/sh
    - -c
    - |
      echo "ephemeral-target running at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
      while true; do
        echo "[$(date -u +%H:%M:%S)] app: healthy"
        sleep 5
      done
    resources:
      requests:
        memory: "16Mi"
        cpu: "25m"
      limits:
        memory: "32Mi"
        cpu: "50m"
    env:
    - name: APP_ENV
      valueFrom:
        configMapKeyRef:
          name: ephemeral-target-config
          key: app.env